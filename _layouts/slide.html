layout: nil
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ page.title }}</title>

  <!-- Reveal.js core CSS -->
  <link rel="stylesheet" href="{{ 'assets/reveal/dist/reveal.css' | relative_url }}">
  <link rel="stylesheet" href="{{ 'assets/reveal/dist/theme/ichec.css' | relative_url }}" id="theme">

  <!-- Optional custom styling -->
  <link rel="stylesheet" href="{{ 'assets/css/custom.css' | relative_url }}">
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <!-- Use Reveal's markdown loader -->
      <section data-markdown
               data-separator="^---$"
               data-separator-vertical="^--$"
               data-separator-notes="^Note:">
        <textarea data-template>
{{ page.content }}
        </textarea>
      </section>
    </div>
  </div>

  <!-- Reveal.js core -->
  <script src="{{ 'assets/reveal/dist/reveal.js' | relative_url }}"></script>

  <!-- Plugins -->
  <script src="{{ 'assets/reveal/plugin/markdown/markdown.js' | relative_url }}"></script>
  <script src="{{ 'assets/reveal/plugin/highlight/highlight.js' | relative_url }}"></script>
  <script src="{{ 'assets/reveal/plugin/math/math.js' | relative_url }}"></script>
  <script src="{{ 'assets/reveal/plugin/notes/notes.js' | relative_url }}"></script>

  <!-- Audio slideshow plugin -->
  <script src="{{ 'assets/reveal/plugin/audio-slideshow/plugin.js' | relative_url }}"></script>
  <script src="{{ 'assets/reveal/plugin/audio-slideshow/recorder.js' | relative_url }}"></script>

  <!-- Mermaid plugin <script src="{{ 'assets/reveal/plugin/mermaid/mermaid.js' | relative_url }}"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>


  <script>

  mermaid.initialize({
    startOnLoad: false,   // IMPORTANT: Reveal controls rendering
    theme: "default"
  });

  function renderMermaid() {
    document.querySelectorAll('.mermaid').forEach((el) => {
      try {
        mermaid.init(undefined, el);
      } catch (e) {
        console.warn("Mermaid render error:", e);
      }
    });
  }
    
  Reveal.initialize({
      hash: true,
      plugins: [
        RevealMarkdown,
        RevealHighlight,
        RevealMath,
        RevealNotes,
        RevealAudioSlideshow,
        RevealAudioRecorder
      ],
      audio: {
        prefix: '{{ page.url }}audio/', // lecture-local audio folder
        suffix: '.mp3',
        autoplay: false,         // don't try to autoplay
        defaultDuration: 0,
        advance: false,          // don't auto-advance
        playerOpacity: 0.8,      // startAtFragment: true
        playerStyle: 'position: fixed; bottom: 4px; left: 25%; width: 50%; height:75px; z-index: 33;',

        recorder: {
          enabled: true,
          autoplay: false,
          loop: false,
        }
      },
      transition: "fade",
      navigationMode: "default"
    });

  Reveal.on('ready', renderMermaid);
  Reveal.on('slidechanged', renderMermaid);
  Reveal.on('fragmentshown', renderMermaid);
  </script>
</body>
</html>
